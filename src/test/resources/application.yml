spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    driver-class-name: org.postgresql.Driver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: none

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: localhost
      port: 6379

exchange:
  providers:
    frankfurter:
      base-url: http://localhost:${mockwebserver.port:8089}

  scheduler:
    cron: "0 0 0 29 2 ?"   # Never – leap day only

logging:
  level:
    com.example.currencyexchange: WARN
