spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  cache:
    type: none

exchange:
  providers:
    frankfurter:
      base-url: http://localhost:${mockwebserver.port:8089}

  scheduler:
    cron: "0 0 0 29 2 ?"   # Never – leap day only

logging:
  level:
    com.example.currencyexchange: WARN
