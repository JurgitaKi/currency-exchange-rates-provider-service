spring:
  application:
    name: currency-exchange-rates-provider-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/currencydb}
    username: ${SPRING_DATASOURCE_USERNAME:currency_user}
    password: ${SPRING_DATASOURCE_PASSWORD:currency_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  cache:
    type: redis

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 1000ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.example.currencyexchange: DEBUG
    org.springframework.security: INFO

# Exchange rate providers configuration
exchange:
  providers:
    frankfurter:
      base-url: https://api.frankfurter.app
    openexchangerates:
      base-url: https://openexchangerates.org/api
      # api-key: your-api-key-here  # Uncomment and set to enable OpenExchangeRates
    provider1:
      base-url: http://localhost:8081
    provider2:
      base-url: http://localhost:8082
    provider3:
      base-url: http://localhost:8083

  scheduler:
    cron: "0 0 * * * *"  # Every hour

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
