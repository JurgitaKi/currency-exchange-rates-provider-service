databaseChangeLog:
  - changeSet:
      id: 005-insert-default-users
      author: currency-exchange-service
      comment: >
        Seed roles and default users. Passwords are BCrypt-encoded.
        user/user123, admin/admin123, premium/premium123
      changes:
        # Roles
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_USER
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_ADMIN
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_PREMIUM_USER

        # Users (BCrypt of user123, admin123, premium123)
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: user
              - column:
                  name: password
                  value: "$2b$10$27cd/q9YE8Q4pvXFgXrSxus4x735RwizHUNC9X/BxRp6KmwxRwE.W"
              - column:
                  name: enabled
                  valueBoolean: true
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: "$2b$10$IKIP9Usgz4i67yrbypwc..Bmn98u6vzs7HhVnFMjfjyhrN283KEJK"
              - column:
                  name: enabled
                  valueBoolean: true
        - insert:
            tableName: users
            columns:
              - column:
                  name: username
                  value: premium
              - column:
                  name: password
                  value: "$2b$10$lYOnbYjKfdc7UXP6nadRCeiIhrZlNxDurrjzINY7jPTgW0w6FUyxu"
              - column:
                  name: enabled
                  valueBoolean: true

        # user -> ROLE_USER
        - sql:
            sql: >
              INSERT INTO user_roles (user_id, role_id)
              SELECT u.id, r.id FROM users u, roles r
              WHERE u.username = 'user' AND r.name = 'ROLE_USER'

        # admin -> ROLE_ADMIN + ROLE_USER
        - sql:
            sql: >
              INSERT INTO user_roles (user_id, role_id)
              SELECT u.id, r.id FROM users u, roles r
              WHERE u.username = 'admin' AND r.name = 'ROLE_ADMIN'
        - sql:
            sql: >
              INSERT INTO user_roles (user_id, role_id)
              SELECT u.id, r.id FROM users u, roles r
              WHERE u.username = 'admin' AND r.name = 'ROLE_USER'

        # premium -> ROLE_PREMIUM_USER + ROLE_USER
        - sql:
            sql: >
              INSERT INTO user_roles (user_id, role_id)
              SELECT u.id, r.id FROM users u, roles r
              WHERE u.username = 'premium' AND r.name = 'ROLE_PREMIUM_USER'
        - sql:
            sql: >
              INSERT INTO user_roles (user_id, role_id)
              SELECT u.id, r.id FROM users u, roles r
              WHERE u.username = 'premium' AND r.name = 'ROLE_USER'

      rollback:
        - delete:
            tableName: user_roles
        - delete:
            tableName: users
        - delete:
            tableName: roles
