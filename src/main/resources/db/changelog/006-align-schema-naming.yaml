databaseChangeLog:
  - changeSet:
      id: 006-align-schema-naming-exchange-rates
      author: currency-exchange-service
      comment: Align exchange_rates table column names to semantic naming (base_currency, target_currency, timestamp)
      changes:
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: from_currency_id
            newColumnName: base_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: to_currency_id
            newColumnName: target_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: fetched_at
            newColumnName: timestamp
            columnDataType: TIMESTAMP
        - dropIndex:
            tableName: exchange_rates
            indexName: idx_er_from_to
        - createIndex:
            tableName: exchange_rates
            indexName: idx_er_base_target
            columns:
              - column:
                  name: base_currency_id
              - column:
                  name: target_currency_id
        - dropUniqueConstraint:
            tableName: exchange_rates
            constraintName: uq_exchange_rates_pair
        - addUniqueConstraint:
            tableName: exchange_rates
            columnNames: base_currency_id, target_currency_id
            constraintName: uq_exchange_rates_pair
        - dropForeignKeyConstraint:
            baseTableName: exchange_rates
            constraintName: fk_er_from_currency
        - dropForeignKeyConstraint:
            baseTableName: exchange_rates
            constraintName: fk_er_to_currency
        - addForeignKeyConstraint:
            baseTableName: exchange_rates
            baseColumnNames: base_currency_id
            referencedTableName: currencies
            referencedColumnNames: id
            constraintName: fk_er_base_currency
        - addForeignKeyConstraint:
            baseTableName: exchange_rates
            baseColumnNames: target_currency_id
            referencedTableName: currencies
            referencedColumnNames: id
            constraintName: fk_er_target_currency
      rollback:
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: base_currency_id
            newColumnName: from_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: target_currency_id
            newColumnName: to_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: exchange_rates
            oldColumnName: timestamp
            newColumnName: fetched_at
            columnDataType: TIMESTAMP

  - changeSet:
      id: 006-align-schema-naming-historical-rates
      author: currency-exchange-service
      comment: Align historical_rates table column names to semantic naming
      changes:
        - renameColumn:
            tableName: historical_rates
            oldColumnName: from_currency_id
            newColumnName: base_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: historical_rates
            oldColumnName: to_currency_id
            newColumnName: target_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: historical_rates
            oldColumnName: fetched_at
            newColumnName: timestamp
            columnDataType: TIMESTAMP
        - dropIndex:
            tableName: historical_rates
            indexName: idx_hist_from_to_fetched
        - createIndex:
            tableName: historical_rates
            indexName: idx_hist_base_target_ts
            columns:
              - column:
                  name: base_currency_id
              - column:
                  name: target_currency_id
              - column:
                  name: timestamp
        - dropForeignKeyConstraint:
            baseTableName: historical_rates
            constraintName: fk_hr_from_currency
        - dropForeignKeyConstraint:
            baseTableName: historical_rates
            constraintName: fk_hr_to_currency
        - addForeignKeyConstraint:
            baseTableName: historical_rates
            baseColumnNames: base_currency_id
            referencedTableName: currencies
            referencedColumnNames: id
            constraintName: fk_hr_base_currency
        - addForeignKeyConstraint:
            baseTableName: historical_rates
            baseColumnNames: target_currency_id
            referencedTableName: currencies
            referencedColumnNames: id
            constraintName: fk_hr_target_currency
      rollback:
        - renameColumn:
            tableName: historical_rates
            oldColumnName: base_currency_id
            newColumnName: from_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: historical_rates
            oldColumnName: target_currency_id
            newColumnName: to_currency_id
            columnDataType: BIGINT
        - renameColumn:
            tableName: historical_rates
            oldColumnName: timestamp
            newColumnName: fetched_at
            columnDataType: TIMESTAMP
